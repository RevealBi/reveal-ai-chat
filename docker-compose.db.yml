# Reveal AI Chat — local database for "Run from source".
#
# Use this ONLY when you run the server/client from source (F5 / npm run dev). It publishes
# the database on localhost:5432 so the locally-debugged server can reach it. The full Docker
# app (docker-compose.app.yml) starts its OWN copy of this same image internally — do not use
# this file for that.
#
# It's the exact same image and data as the full app (brianlagunas/reveal-samples-db): seven
# ready-made sample databases — retail, finance, healthcare, automotive, manufacturing, energy,
# telecom — with the data baked in, so there's nothing to seed and no data volume to manage.
# Every start is a clean, fully-populated server.
#
# A distinct Compose project name keeps this isolated from the full app, so the two never
# recreate or clobber each other's containers.
#
#   docker compose -f docker-compose.db.yml up -d      # start
#   docker compose -f docker-compose.db.yml down       # stop

name: reveal-ai-chat-db

services:
  db:
    image: brianlagunas/reveal-samples-db:1.0.0
    container_name: reveal-ai-chat-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveal -d retail"]
      interval: 3s
      timeout: 3s
      retries: 30
