# Full app — no .NET / Node / source needed, just Docker. On first run the app shows a
# Settings dialog in the browser to collect your Reveal license + LLM provider/model/key;
# they're saved encrypted in a volume, so you only do it once.
#
#   docker compose -f docker-compose.app.yml up --build     # build from source
#   docker compose -f docker-compose.app.yml pull            # ...or from published images
#   docker compose -f docker-compose.app.yml up
#
# Then open http://localhost:5111 and fill in the dialog.
#
# Prefer to inject keys up front (CI / unattended)? Uncomment the env lines under `app`.

name: reveal-ai-chat

services:
  db:
    build: ./db
    image: revealbi/reveal-ai-chat-sample-db:latest
    environment:
      POSTGRES_DB: revealaichat
      POSTGRES_USER: reveal
      POSTGRES_PASSWORD: reveal_ai_chat
    volumes:
      - reveal-ai-chat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveal -d revealaichat"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: revealbi/reveal-ai-chat-sample:latest
    restart: unless-stopped          # the one-time post-setup restart comes right back
    environment:
      Database__Host: db
      Database__Port: "5432"
      Database__Name: revealaichat
      Database__User: reveal
      Database__Password: reveal_ai_chat
      Setup__ConfigDir: /config       # encrypted keys + Data Protection key-ring live here
      # Keys are entered in the app's first-run dialog by default. To inject them up front
      # instead (CI / unattended), uncomment and set these:
      # RevealAI__Provider: ${AI_PROVIDER:-OpenAI}        # OpenAI | Anthropic | AzureOpenAI
      # RevealAI__ApiKey: ${AI_API_KEY:-}
      # RevealAI__Model: ${AI_MODEL:-}
      # RevealAI__Endpoint: ${AI_ENDPOINT:-}              # Azure resource endpoint / OpenAI-compatible base URL
      # RevealAI__Deployment: ${AI_DEPLOYMENT:-}          # Azure deployment name
      # Reveal__License: ${REVEAL_LICENSE:-}
      # Reveal__LicenseFile: /run/secrets/reveal_license
    volumes:
      - reveal-ai-chat-config:/config
    ports:
      - "5111:5111"
    depends_on:
      db:
        condition: service_healthy

volumes:
  reveal-ai-chat-pgdata:
  reveal-ai-chat-config:
