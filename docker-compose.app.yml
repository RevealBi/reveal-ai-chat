# Full app — no .NET / Node / source needed, just Docker. On first run the app shows a
# Settings dialog in the browser to collect your Reveal license + LLM provider/model/key;
# they're saved encrypted in a volume, so you only do it once.
#
#   docker compose -f docker-compose.app.yml up --build     # builds the app from source (not published anywhere), then starts
#
# Then open http://localhost:8111 and fill in the dialog.

name: reveal-ai-chat

services:
  db:
    build: ./db
    image: revealbi/reveal-ai-chat-sample-db:latest
    environment:
      POSTGRES_DB: revealaichat
      POSTGRES_USER: reveal
      POSTGRES_PASSWORD: reveal_ai_chat
    volumes:
      - reveal-ai-chat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveal -d revealaichat"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: revealbi/reveal-ai-chat-sample:latest
    restart: unless-stopped          # crash resilience only; the post-setup restart now happens in-process
    environment:
      ASPNETCORE_URLS: http://+:8111   # app listens on 8111 (matches the published port below)
      Database__Host: db
      Database__Port: "5432"
      Database__Name: revealaichat
      Database__User: reveal
      Database__Password: reveal_ai_chat
      Setup__ConfigDir: /config       # encrypted keys (entered in the first-run dialog) + Data Protection key-ring
    volumes:
      - reveal-ai-chat-config:/config
    ports:
      - "8111:8111"
    depends_on:
      db:
        condition: service_healthy

volumes:
  reveal-ai-chat-pgdata:
  reveal-ai-chat-config:
