# Full app, BUILT FROM SOURCE — for running your own edits. Builds the app image from this repo
# and runs it next to the sample database. To run the PUBLISHED image instead (no build), use
# docker-compose-image-tag.yml. On first run the app shows a Settings dialog in the browser to
# collect your Reveal license + LLM provider/model/key; they're saved encrypted in a volume.
#
#   docker compose -f docker-compose.app.yml up --build     # build from source, then start
#
# Then open http://localhost:8111 and fill in the dialog.

name: reveal-ai-chat

services:
  db:
    # Prebuilt sample database: seven databases (retail, finance, healthcare, automotive,
    # manufacturing, energy, telecom) with the data baked into the image — nothing to seed.
    # This is the SAME image and data as docker-compose.db.yml; here it stays internal to the
    # Compose network (the app reaches it as host "db"), so it is not published to localhost.
    # That's why "Run from source" uses docker-compose.db.yml instead — it exposes :5432.
    image: brianlagunas/reveal-samples-db:1.0.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveal -d retail"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brianlagunas/reveal-ai-chat:latest   # the image this build produces (and what gets published)
    restart: unless-stopped          # crash resilience only; the post-setup restart now happens in-process
    environment:
      ASPNETCORE_URLS: http://+:8111   # app listens on 8111 (matches the published port below)
      Database__Host: db
      Database__Port: "5432"
      Database__User: reveal
      Database__Password: reveal       # per-vertical database name comes from Reveal/Metadata/catalog.json
      Setup__ConfigDir: /config       # encrypted keys (entered in the first-run dialog) + Data Protection key-ring
    volumes:
      - reveal-ai-chat-config:/config
    ports:
      - "8111:8111"
    depends_on:
      db:
        condition: service_healthy

volumes:
  reveal-ai-chat-config:
